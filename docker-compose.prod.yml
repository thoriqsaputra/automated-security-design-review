# Production Override Configuration for Docker Compose
# Use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  api-gateway:
    environment:
      - LOG_LEVEL=WARNING
      - DEBUG=false
      - ENABLE_SWAGGER_UI=false
      - ENABLE_REDOC=false
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --loop uvloop
      --http httptools
      --access-log
      --use-colors false

  ingestion-service:
    environment:
      - LOG_LEVEL=INFO
      - DEBUG=false
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  indexing-service:
    environment:
      - LOG_LEVEL=INFO
      - DEBUG=false
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G

  reasoning-service:
    environment:
      - LOG_LEVEL=INFO
      - DEBUG=false
      - MAX_DEBATE_ITERATIONS=3
      - CACHE_TTL_SECONDS=3600
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G

  celery-worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdr-celery-worker-1
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@message-broker:5672/
      - CELERY_RESULT_BACKEND=redis://vector-db:6379/0
      - WORKER_NAME=worker-1
    depends_on:
      - message-broker
      - vector-db
    networks:
      - sdr-network
    restart: unless-stopped
    volumes:
      - ./ingestion:/app/ingestion:ro
      - ./rag_engine:/app/rag_engine:ro
      - ./agents:/app/agents:ro
      - ./core:/app/core:ro
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    command: >
      celery -A core.tasks
      worker
      --loglevel=info
      --concurrency=4
      --prefetch-multiplier=1
      --max-tasks-per-child=1000
      -n worker1@%h

  celery-worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdr-celery-worker-2
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - CELERY_BROKER_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@message-broker:5672/
      - CELERY_RESULT_BACKEND=redis://vector-db:6379/0
      - WORKER_NAME=worker-2
    depends_on:
      - message-broker
      - vector-db
    networks:
      - sdr-network
    restart: unless-stopped
    volumes:
      - ./ingestion:/app/ingestion:ro
      - ./rag_engine:/app/rag_engine:ro
      - ./agents:/app/agents:ro
      - ./core:/app/core:ro
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    command: >
      celery -A core.tasks
      worker
      --loglevel=info
      --concurrency=4
      --prefetch-multiplier=1
      --max-tasks-per-child=1000
      -n worker2@%h

  celery-beat:
    environment:
      - LOG_LEVEL=INFO
      - DEBUG=false
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  message-broker:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

  vector-db:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    volumes:
      - redis-data:/data

  graph-db:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASS:-password}
      - NEO4J_METRICS_ENABLED=true
      - NEO4J_db_memory_heap_initial__size=512M
      - NEO4J_db_memory_heap_max__size=1G
      - NEO4J_db_memory_pagecache_size=500M
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  minio:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    volumes:
      - minio-data:/minio_data
    environment:
      - MINIO_CONFIG_DIR=/root/.minio
      - MINIO_CACHE_DRIVES=/cache
      - MINIO_CACHE_EXCLUDE=*.tmp

  postgres:
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    environment:
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"

  nginx:
    image: nginx:alpine
    container_name: sdr-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
    networks:
      - sdr-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
