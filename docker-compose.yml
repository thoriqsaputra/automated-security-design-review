services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sdr-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sdr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdr_password}
      POSTGRES_DB: ${POSTGRES_DB:-sdr_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sdr_user} -d ${POSTGRES_DB:-sdr_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sdr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: sdr-api
    command: /opt/venv/bin/uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app # remove when in production, for development only
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: sdr-celery-worker
    # Note: Celery doesn't auto-reload gracefully like Uvicorn natively without watchdog libraries,
    # but the volume mount ensures any manual container restart instantly gets new code.
    command: /opt/venv/bin/celery -A core.celery_app worker --loglevel=info
    volumes:
      - .:/app # remove when in production, for development only
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - C_FORCE_ROOT=1
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
