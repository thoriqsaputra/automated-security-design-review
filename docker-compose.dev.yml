# Development Override Configuration for Docker Compose
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  api-gateway:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - ENABLE_SWAGGER_UI=true
      - ENABLE_REDOC=true
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./core:/app/core
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug

  ingestion-service:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      - ./ingestion:/app/ingestion
      - ./core:/app/core
      - sdr-blob-storage:/data/blobs

  indexing-service:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      - ./rag_engine:/app/rag_engine
      - ./core:/app/core
      - indexing-cache:/app/.cache

  reasoning-service:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - MAX_DEBATE_ITERATIONS=3
    volumes:
      - ./agents:/app/agents
      - ./core:/app/core
    # Keep it alive for debugging
    stdin_open: true
    tty: true

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdr-celery-worker
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - CELERY_BROKER_URL=amqp://guest:guest@message-broker:5672/
      - CELERY_RESULT_BACKEND=redis://vector-db:6379/0
    depends_on:
      - message-broker
      - vector-db
    networks:
      - sdr-network
    volumes:
      - ./ingestion:/app/ingestion
      - ./rag_engine:/app/rag_engine
      - ./agents:/app/agents
      - ./core:/app/core
    command: >
      celery -A core.tasks
      worker
      --loglevel=debug
      --concurrency=2
      -n worker1@%h
    profiles:
      - async

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdr-celery-beat
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - CELERY_BROKER_URL=amqp://guest:guest@message-broker:5672/
      - CELERY_RESULT_BACKEND=redis://vector-db:6379/0
    depends_on:
      - message-broker
      - postgres
    networks:
      - sdr-network
    volumes:
      - ./core:/app/core
    command: >
      celery -A core.tasks
      beat
      --loglevel=debug
    profiles:
      - async

  flower:
    image: mher/flower:latest
    container_name: sdr-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@message-broker:5672/
      - CELERY_RESULT_BACKEND=redis://vector-db:6379/0
    depends_on:
      - message-broker
      - vector-db
    networks:
      - sdr-network
    profiles:
      - async

  logs:
    image: amir20/dozzle:latest
    container_name: sdr-logs
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sdr-network
    restart: unless-stopped
